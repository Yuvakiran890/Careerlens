<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CareerLens | Forgot Password</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              600: '#2563eb',
              700: '#1d4ed8',
            },
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Outfit', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <style>
    .glass {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .gradient-bg {
      background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
    }
  </style>
</head>

<body class="bg-[#f8fafc] font-sans min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
  <!-- Decorative Elements -->
  <div
    class="absolute top-0 left-0 w-[500px] h-[500px] bg-primary-600/10 blur-[120px] rounded-full -translate-x-1/2 -translate-y-1/2">
  </div>
  <div
    class="absolute bottom-1/2 right-0 w-[400px] h-[400px] bg-purple-600/10 blur-[100px] rounded-full translate-x-1/2">
  </div>

  <div
    class="w-full max-w-lg glass rounded-[40px] shadow-2xl overflow-hidden p-12 relative z-10 text-center animate-in fade-in zoom-in-95 duration-500">
    <a href="login.html"
      class="inline-flex items-center gap-2 group mb-10 text-sm font-bold text-primary-600 hover:text-primary-700 transition-colors">
      <i data-lucide="arrow-left" class="w-4 h-4 group-hover:-translate-x-1 transition-transform"></i>
      Back to Login
    </a>

    <div
      class="w-20 h-20 bg-primary-50 text-primary-600 rounded-3xl flex items-center justify-center mx-auto mb-8 shadow-inner">
      <i data-lucide="key-round" class="w-10 h-10"></i>
    </div>

    <h2 class="text-3xl font-display font-extrabold text-gray-900 mb-4">Forgot Password?</h2>
    <p class="text-gray-500 mb-10 leading-relaxed">
      No worries! Enter your email address below and we'll send you a link to reset your password.
    </p>

    <form id="forgotForm" class="space-y-6">
      <div class="space-y-2 text-left">
        <label class="block text-sm font-bold text-gray-700 uppercase tracking-widest pl-1">Email Address</label>
        <div class="relative group">
          <i data-lucide="mail"
            class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400 group-focus-within:text-primary-600 transition-colors"></i>
          <input type="email" id="email" placeholder="Enter your email"
            class="w-full pl-12 pr-4 py-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-primary-600/20 focus:border-primary-600 transition-all"
            required>
        </div>
      </div>

      <p id="message" class="text-sm font-bold hidden flex items-center justify-center gap-2"></p>

      <button type="submit"
        class="w-full gradient-bg text-white py-4 rounded-2xl font-bold text-lg shadow-xl shadow-primary-600/20 hover:scale-[1.01] active:scale-[0.99] transition-all flex items-center justify-center gap-2">
        Send Reset Link
        <i data-lucide="send" class="w-5 h-5"></i>
      </button>
    </form>

    <div class="mt-10 pt-10 border-t border-gray-100">
      <p class="text-xs text-gray-400 font-medium italic">
        Check your spam folder if you don't see the email within a few minutes.
      </p>
    </div>
  </div>

  <script>
    lucide.createIcons();

    document.getElementById("forgotForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      const msg = document.getElementById("message");
      const btn = e.target.querySelector('button');

      btn.disabled = true;
      btn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Sending...`;
      lucide.createIcons();

      try {
        const response = await fetch("/forgot-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email })
        });

        const data = await response.json();

        if (data.success) {
          msg.innerHTML = `<i data-lucide="check-circle" class="w-4 h-4 text-green-600"></i> <span class="text-green-600">Reset link sent to your email!</span>`;
          msg.classList.remove("hidden");
          setTimeout(() => window.location.href = "login.html", 3000);
        } else {
          msg.innerHTML = `<i data-lucide="alert-circle" class="w-4 h-4 text-red-600"></i> <span class="text-red-500">${data.message || "Failed to send link"}</span>`;
          msg.classList.remove("hidden");
        }
      } catch (err) {
        msg.innerHTML = `<i data-lucide="alert-circle" class="w-4 h-4 text-red-600"></i> <span class="text-red-500">Network error. Try again.</span>`;
        msg.classList.remove("hidden");
      } finally {
        btn.disabled = false;
        btn.innerHTML = `Send Reset Link <i data-lucide="send" class="w-5 h-5"></i>`;
        lucide.createIcons();
      }
    });
  </script>
</body>

</html>
