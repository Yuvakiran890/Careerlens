<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerLens | Admin Dashboard</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#eff6ff', 100: '#dbeafe', 600: '#2563eb', 700: '#1d4ed8', 900: '#1e3a8a' },
                        secondary: '#7c3aed',
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Outfit', 'sans-serif'] },
                }
            }
        }
    </script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .gradient-bg {
            background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen font-sans text-gray-900 overflow-x-hidden">

    <!-- ADMIN LOGIN MODAL -->
    <div id="login-modal"
        class="fixed inset-0 z-[100] bg-gray-900/80 backdrop-blur-xl flex items-center justify-center px-6">
        <div class="glass w-full max-w-md p-10 rounded-3xl shadow-2xl text-center space-y-6">
            <div
                class="w-20 h-20 gradient-bg rounded-2xl mx-auto flex items-center justify-center text-white shadow-xl shadow-primary-600/30">
                <i data-lucide="shield-check" class="w-10 h-10"></i>
            </div>
            <div class="space-y-2">
                <h2 class="text-3xl font-extrabold tracking-tight">Admin Access</h2>
                <p class="text-gray-500 font-medium">Please enter your master credentials</p>
            </div>
            <div class="space-y-4">
                <input type="email" id="adminEmail" placeholder="Master Email"
                    class="w-full px-5 py-4 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-primary-600/20 focus:border-primary-600 transition-all">
                <input type="password" id="adminPassword" placeholder="Master Password"
                    class="w-full px-5 py-4 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-primary-600/20 focus:border-primary-600 transition-all">
                <button onclick="handleLogin()"
                    class="w-full py-4 gradient-bg text-white rounded-xl font-bold shadow-xl shadow-primary-600/30 hover:scale-[1.02] transition-all">Verify
                    Identity</button>
            </div>
            <p id="error-txt" class="text-red-500 text-sm font-bold hidden"></p>
            <a href="index.html" class="block text-gray-400 font-bold hover:text-gray-600 transition-colors">Abort &
                Return Home</a>
        </div>
    </div>

    <!-- MAIN DASHBOARD (Hidden until login) -->
    <div id="dashboard-content" class="hidden">
        <nav class="fixed top-0 w-full z-50 glass border-b border-gray-200/50 h-20 flex items-center px-6">
            <div class="max-w-7xl mx-auto w-full flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div class="w-10 h-10 gradient-bg rounded-xl flex items-center justify-center text-white shadow-lg">
                        <i data-lucide="scan-line" class="w-6 h-6"></i>
                    </div>
                    <span class="font-display text-2xl font-bold">CareerLens <span
                            class="text-primary-600">Admin</span></span>
                </div>
                <div class="flex items-center gap-4">
                    <button onclick="logoutAdmin()"
                        class="text-gray-500 font-bold hover:text-red-500 transition-all px-4 py-2 hover:bg-red-50 rounded-xl">Logout</button>
                    <a href="index.html"
                        class="flex items-center gap-2 px-4 py-2 bg-white rounded-xl border border-gray-200 font-bold hover:bg-gray-50 transition-all shadow-sm">
                        <i data-lucide="home" class="w-5 h-5"></i> Home
                    </a>
                </div>
            </div>
        </nav>

        <main class="pt-32 pb-20 max-w-7xl mx-auto px-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12" id="stats-container">
                <!-- Stat Cards -->
            </div>

            <div class="glass rounded-3xl shadow-2xl overflow-hidden">
                <div class="p-8 border-b border-gray-100 flex justify-between items-center bg-white/30">
                    <h3 class="text-xl font-bold flex items-center gap-3">
                        <i data-lucide="history" class="w-6 h-6 text-primary-600"></i> Platform-Wide Activity
                    </h3>
                    <div class="flex items-center gap-2 text-xs font-bold text-gray-400 uppercase tracking-widest">
                        <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> Live Sync Active
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-gray-50/50 text-[10px] uppercase tracking-widest font-bold text-gray-400">
                            <tr>
                                <th class="px-8 py-5">User Email</th>
                                <th class="px-8 py-5">Role Target</th>
                                <th class="px-8 py-5">Score</th>
                                <th class="px-8 py-5">Expertise</th>
                                <th class="px-8 py-5">Timestamp</th>
                            </tr>
                        </thead>
                        <tbody id="activity-body" class="divide-y divide-gray-100">
                            <!-- Rows -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();

        function handleLogin() {
            const email = document.getElementById("adminEmail").value.trim();
            const password = document.getElementById("adminPassword").value.trim();
            const error = document.getElementById("error-txt");

            if (email && password) {
                // Initial check for loading
                sessionStorage.setItem("adm_e", email);
                sessionStorage.setItem("adm_p", password);
                loadStats();
            } else {
                error.textContent = "Please fill all fields";
                error.classList.remove("hidden");
            }
        }

        async function loadStats() {
            const email = sessionStorage.getItem("adm_e");
            const pass = sessionStorage.getItem("adm_p");
            const error = document.getElementById("error-txt");

            if (!email || !pass) {
                document.getElementById("login-modal").classList.remove("hidden");
                document.getElementById("dashboard-content").classList.add("hidden");
                return;
            }

            try {
                const res = await fetch(`/admin-stats?email=${email}&password=${pass}`);
                const data = await res.json();

                if (!data.success) {
                    error.textContent = "Invalid Credentials";
                    error.classList.remove("hidden");
                    sessionStorage.clear();
                    return;
                }

                // Success
                document.getElementById("login-modal").classList.add("hidden");
                document.getElementById("dashboard-content").classList.remove("hidden");
                renderStats(data.stats);
                renderActivity(data.recentActivity);
            } catch (err) {
                error.textContent = "Server Connection Error";
                error.classList.remove("hidden");
            }
        }

        function renderStats(stats) {
            document.getElementById("stats-container").innerHTML = `
                <div class="glass p-8 rounded-3xl shadow-xl border-l-[6px] border-primary-600">
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1 font-mono">Total Users</p>
                    <h2 class="text-5xl font-extrabold text-primary-600 tracking-tighter">${stats.totalUsers}</h2>
                </div>
                <div class="glass p-8 rounded-3xl shadow-xl border-l-[6px] border-secondary">
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1 font-mono">Analyses</p>
                    <h2 class="text-5xl font-extrabold text-secondary tracking-tighter">${stats.totalAnalyses}</h2>
                </div>
                <div class="glass p-8 rounded-3xl shadow-xl border-l-[6px] border-green-500">
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1 font-mono">Platform Score</p>
                    <h2 class="text-5xl font-extrabold text-green-600 tracking-tighter">${stats.avgScore}%</h2>
                </div>
            `;
        }

        function renderActivity(activity) {
            const body = document.getElementById("activity-body");
            if (!activity || activity.length === 0) {
                body.innerHTML = '<tr><td colspan="5" class="p-20 text-center text-gray-400 font-medium italic">No activity found.</td></tr>';
                return;
            }

            body.innerHTML = activity.map(a => `
                <tr class="hover:bg-primary-50/20 transition-all border-l-4 border-transparent hover:border-primary-600">
                    <td class="px-8 py-5 font-bold text-sm text-gray-900">${a.user_email}</td>
                    <td class="px-8 py-5 text-sm text-gray-500 font-medium">${a.job_role}</td>
                    <td class="px-8 py-5">
                        <span class="px-2 py-1 bg-primary-900 text-white rounded-md text-[10px] font-black">${a.resume_score}%</span>
                    </td>
                    <td class="px-8 py-5">
                        <span class="text-xs font-black uppercase tracking-widest ${a.level === 'Advanced' ? 'text-green-600' : 'text-primary-600'}">${a.level}</span>
                    </td>
                    <td class="px-8 py-5 text-[10px] text-gray-400 font-bold uppercase">${new Date(a.created_at).toLocaleDateString()}</td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        function logoutAdmin() {
            sessionStorage.clear();
            window.location.reload();
        }

        // Run Check
        if (sessionStorage.getItem("adm_e")) loadStats();

    </script>
</body>

</html>
