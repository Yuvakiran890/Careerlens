<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CareerLens | Sign Up</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              600: '#2563eb',
              700: '#1d4ed8',
            },
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Outfit', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <style>
    .glass {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .gradient-bg {
      background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
    }
  </style>
</head>

<body class="bg-[#f8fafc] font-sans min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
  <!-- Decorative Elements -->
  <div
    class="absolute top-0 right-0 w-[500px] h-[500px] bg-primary-600/10 blur-[120px] rounded-full translate-x-1/2 -translate-y-1/2">
  </div>
  <div
    class="absolute bottom-0 left-0 w-[500px] h-[500px] bg-purple-600/10 blur-[120px] rounded-full -translate-x-1/2 translate-y-1/2">
  </div>

  <div
    class="w-full max-w-5xl glass rounded-[40px] shadow-2xl overflow-hidden flex flex-col md:flex-row-reverse min-h-[700px] relative z-10">
    <!-- Panel: Branding -->
    <div class="w-full md:w-1/2 gradient-bg p-12 text-white flex flex-col justify-between">
      <a href="login.html" class="flex items-center gap-2 group justify-end">
        <span class="font-bold">Already have an account?</span>
        <i data-lucide="arrow-right" class="w-5 h-5 group-hover:translate-x-1 transition-transform"></i>
      </a>

      <div class="space-y-6">
        <div class="w-16 h-16 bg-white/20 backdrop-blur-lg rounded-2xl flex items-center justify-center">
          <i data-lucide="rocket" class="w-10 h-10"></i>
        </div>
        <h1 class="font-display text-5xl font-extrabold leading-tight">
          Start Your <br /> Career <br /> Journey.
        </h1>
        <p class="text-white/80 text-lg leading-relaxed max-w-xs">
          Join thousands of professionals using AI to land their dream roles.
        </p>
      </div>

      <div class="text-sm text-white/60">
        &copy; 2026 CareerLens AI. All rights reserved.
      </div>
    </div>

    <!-- Panel: Form -->
    <div class="w-full md:w-1/2 bg-white p-12 flex flex-col justify-center">
      <div class="mb-10 text-center md:text-left">
        <h2 class="text-3xl font-display font-extrabold text-gray-900 mb-2">Create Account</h2>
        <p class="text-gray-500">Fast, secure, and AI-ready.</p>
      </div>

      <form id="signupForm" class="space-y-5">
        <div class="space-y-2">
          <label class="block text-sm font-bold text-gray-700 uppercase tracking-widest pl-1">Full Name</label>
          <div class="relative group">
            <i data-lucide="user"
              class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400 group-focus-within:text-primary-600 transition-colors"></i>
            <input type="text" id="name" placeholder="John Doe"
              class="w-full pl-12 pr-4 py-3.5 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-primary-600/20 focus:border-primary-600 transition-all"
              required>
          </div>
        </div>

        <div class="space-y-2">
          <label class="block text-sm font-bold text-gray-700 uppercase tracking-widest pl-1">Email Address</label>
          <div class="relative group">
            <i data-lucide="mail"
              class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400 group-focus-within:text-primary-600 transition-colors"></i>
            <input type="email" id="email" placeholder="john@example.com"
              class="w-full pl-12 pr-4 py-3.5 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-primary-600/20 focus:border-primary-600 transition-all"
              required>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div class="space-y-2">
            <label class="block text-sm font-bold text-gray-700 uppercase tracking-widest pl-1">Password</label>
            <div class="relative group">
              <i data-lucide="lock"
                class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400 group-focus-within:text-primary-600 transition-colors"></i>
              <input type="password" id="password" placeholder="••••••••"
                class="w-full pl-11 pr-4 py-3.5 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-primary-600/20 focus:border-primary-600 transition-all"
                required>
            </div>
          </div>
          <div class="space-y-2">
            <label class="block text-sm font-bold text-gray-700 uppercase tracking-widest pl-1">Confirm Password</label>
            <div class="relative group">
              <input type="password" id="confirmPassword" placeholder="••••••••"
                class="w-full px-4 py-3.5 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-primary-600/20 focus:border-primary-600 transition-all"
                required>
            </div>
          </div>
        </div>

        <p id="signupMessage" class="text-sm font-bold hidden flex items-center gap-2"></p>

        <button type="submit"
          class="w-full gradient-bg text-white py-4 rounded-2xl font-bold text-lg shadow-xl shadow-primary-600/20 hover:scale-[1.01] active:scale-[0.99] transition-all flex items-center justify-center gap-2">
          Create My Account
          <i data-lucide="rocket" class="w-5 h-5"></i>
        </button>
      </form>

      <div class="mt-8 text-center">
        <p class="text-sm text-gray-500">
          Already have an account? <a href="login.html" class="text-primary-600 font-bold hover:underline">Sign in</a>
        </p>
      </div>
    </div>
  </div>

  <script>
    lucide.createIcons();

    document.getElementById("signupForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const confirm = document.getElementById("confirmPassword").value;
      const msg = document.getElementById("signupMessage");
      const btn = e.target.querySelector('button');

      if (password !== confirm) {
        msg.textContent = "Passwords do not match";
        msg.className = "text-red-500 text-sm font-bold flex items-center gap-2";
        msg.classList.remove("hidden");
        return;
      }

      btn.disabled = true;
      btn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Creating account...`;
      lucide.createIcons();

      try {
        const response = await fetch("/signup", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password, name })
        });

        const data = await response.json();

        if (data.success) {
          msg.innerHTML = `<i data-lucide="check-circle" class="w-4 h-4"></i> Account created successfully! Redirecting...`;
          msg.className = "text-green-600 text-sm font-bold flex items-center gap-2";
          msg.classList.remove("hidden");
          setTimeout(() => window.location.href = "login.html", 2000);
        } else {
          msg.textContent = data.message || "Signup failed";
          msg.className = "text-red-500 text-sm font-bold flex items-center gap-2";
          msg.classList.remove("hidden");
        }
      } catch (err) {
        msg.textContent = "Network error. Please try again.";
        msg.className = "text-red-500 text-sm font-bold flex items-center gap-2";
        msg.classList.remove("hidden");
      } finally {
        btn.disabled = false;
        btn.innerHTML = `Create My Account <i data-lucide="rocket" class="w-5 h-5"></i>`;
        lucide.createIcons();
      }
    });
  </script>
</body>

</html>
